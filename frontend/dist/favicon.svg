<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexágono -->
  <path d="M100 20 L160 50 L160 110 L100 140 L40 110 L40 50 Z" 
        fill="none" 
        stroke="#003366" 
        stroke-width="8" 
        stroke-linejoin="round"/>
  
  <!-- Gráfica - línea ascendente -->
  <g fill="none" stroke="#003366" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Línea de la gráfica -->
    <polyline points="60,100 75,85 90,70 105,60"/>
    
    <!-- Puntos de la gráfica -->
    <circle cx="60" cy="100" r="4" fill="#003366"/>
    <circle cx="75" cy="85" r="4" fill="#003366"/>
    <circle cx="90" cy="70" r="4" fill="#003366"/>
    <circle cx="105" cy="60" r="4" fill="#003366"/>
  </g>
  
  <!-- Flecha ascendente pequeña -->
  <g fill="none" stroke="#0056b3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="120" y1="95" x2="135" y2="80"/>
    <polyline points="135,80 125,85 130,75"/>
  </g>
</svg>
